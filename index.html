<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Russian Numbers Adventure - Học tiếng Nga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'russian-numbers-edu';

        window.db = db;
        window.appId = appId;
        signInAnonymously(auth).catch(console.error);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f0f9ff; overflow-x: hidden; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; padding: 10px; }
        .modal.active { display: flex; }
        #loginOverlay { position: fixed; inset: 0; z-index: 9999; background: #2563eb; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <!-- MÀN HÌNH ĐĂNG NHẬP (Bắt buộc hiện lên đầu tiên) -->
    <div id="loginOverlay">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <span class="text-4xl mb-2 block">🎓</span>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Thông tin sinh viên</h2>
            <p class="text-gray-500 mb-6 text-xs">Vui lòng nhập tên để bắt đầu bài học.</p>
            <input type="text" id="studentName" placeholder="Họ và Tên" class="w-full p-3 border-2 border-gray-100 rounded-xl mb-3 focus:border-blue-500 outline-none text-sm">
            <input type="text" id="studentId" placeholder="Mã số sinh viên (MSSV)" class="w-full p-3 border-2 border-gray-100 rounded-xl mb-6 focus:border-blue-500 outline-none text-sm">
            <button onclick="saveStudentInfo()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg">VÀO HỌC NGAY</button>
        </div>
    </div>

    <!-- BẢNG ĐIỂM GIÁO VIÊN -->
    <div id="teacherModal" class="modal">
        <div class="bg-white p-5 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="font-bold text-lg">Bảng Điểm Hệ Thống 📊</h2>
                <button onclick="closeTeacherModal()" class="text-red-500 font-bold p-2 text-sm">ĐÓNG [X]</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[12px] text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 uppercase">
                            <th class="p-2 border">Sinh viên</th>
                            <th class="p-2 border">MSSV</th>
                            <th class="p-2 border text-center">Điểm</th>
                            <th class="p-2 border">Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="scoreTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- THANH MENU TRÊN CÙNG -->
    <nav class="bg-blue-600 text-white p-3 shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center px-2">
            <h1 class="font-bold text-sm sm:text-lg">🇷🇺 Russian Numbers</h1>
            <button onclick="openTeacherModal()" class="bg-yellow-400 text-blue-900 px-3 py-1.5 rounded-full font-bold text-[10px] uppercase shadow-sm border border-white active:scale-95">
                🔑 Admin
            </button>
        </div>
    </nav>

    <!-- NỘI DUNG CHÍNH -->
    <main class="max-w-4xl mx-auto p-4 sm:p-6 space-y-4">
        
        <!-- Welcome Card -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border-b-4 border-blue-100">
            <h2 class="text-lg font-bold text-gray-800">Chào mừng, <span id="displayName" class="text-blue-600">...</span>!</h2>
            <p class="text-gray-500 text-xs mt-1">Học số tiếng Nga và thử thách bản thân.</p>
        </div>

        <!-- Dashboard / Game Selection -->
        <section id="game-hub" class="space-y-4">
            <h3 class="font-bold text-gray-700 text-sm uppercase tracking-widest pl-1">Chọn trò chơi 🎮</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div onclick="startSpeedGame()" class="bg-white p-6 rounded-2xl border-2 border-blue-50 hover:border-blue-400 cursor-pointer transition shadow-sm flex items-center space-x-4">
                    <span class="text-3xl bg-blue-50 p-3 rounded-xl">⚡</span>
                    <div>
                        <h4 class="font-bold text-blue-800">Tốc độ</h4>
                        <p class="text-gray-400 text-[10px]">30 giây trả lời nhanh</p>
                    </div>
                </div>
                <div class="bg-gray-50 p-6 rounded-2xl border-2 border-dashed border-gray-200 opacity-60 flex items-center space-x-4">
                    <span class="text-3xl bg-gray-100 p-3 rounded-xl">🎧</span>
                    <div>
                        <h4 class="font-bold text-gray-400 font-italic italic">Luyện nghe</h4>
                        <p class="text-gray-400 text-[10px]">Sắp ra mắt...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- SPEED GAME AREA -->
        <section id="game-speed" class="hidden">
             <div class="bg-blue-600 text-white rounded-2xl p-6 text-center shadow-inner relative min-h-[300px] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-blue-500 px-3 py-1 rounded-full text-xs">Score: <span id="currentSpeedScore" class="font-bold text-yellow-300">0</span></span>
                    <span class="bg-red-500 px-3 py-1 rounded-full text-xs font-bold">⏱ <span id="speedTimer">30</span>s</span>
                </div>
                <div id="targetWord" class="text-4xl sm:text-5xl font-extrabold my-8 tracking-wide">...</div>
                <div id="gameOptions" class="grid grid-cols-2 gap-3 max-w-sm mx-auto w-full"></div>
            </div>
        </section>
    </main>

    <script type="module">
        import { collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const cardinalData = [
            { num: 1, ru: "один" }, { num: 2, ru: "два" }, { num: 3, ru: "три" }, { num: 4, ru: "четыре" }, { num: 5, ru: "пять" },
            { num: 10, ru: "десять" }, { num: 20, ru: "двадцать" }, { num: 30, ru: "тридцать" }
        ];

        let currentStudent = { name: "", id: "" };
        let score = 0;
        let timer;

        // Lưu thông tin SV
        window.saveStudentInfo = () => {
            const n = document.getElementById('studentName').value.trim();
            const i = document.getElementById('studentId').value.trim();
            if(!n || !i) return alert("Vui lòng điền đủ tên và MSSV");
            currentStudent = { name: n, id: i };
            document.getElementById('displayName').innerText = n;
            document.getElementById('loginOverlay').style.display = 'none';
        };

        // Ghi điểm
        async function logScore(game, finalScore) {
            if(!window.db) return;
            try {
                await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'scores'), {
                    studentName: currentStudent.name,
                    studentId: currentStudent.id,
                    game: game,
                    score: finalScore,
                    timestamp: serverTimestamp()
                });
            } catch(e) { console.error("Lỗi lưu điểm:", e); }
        }

        // Teacher Modal
        window.openTeacherModal = async () => {
            const p = prompt("Nhập mã Admin (1234):");
            if(p !== "1234") return;
            document.getElementById('teacherModal').classList.add('active');
            const tb = document.getElementById('scoreTableBody');
            tb.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-400">Đang tải dữ liệu...</td></tr>';
            
            try {
                const q = query(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'scores'), orderBy('timestamp', 'desc'));
                const snap = await getDocs(q);
                tb.innerHTML = '';
                if(snap.empty) {
                    tb.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-400">Chưa có dữ liệu sinh viên.</td></tr>';
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    tb.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-2 font-medium">${d.studentName}</td>
                            <td class="p-2 text-gray-500">${d.studentId}</td>
                            <td class="p-2 text-center font-bold text-blue-600">${d.score}</td>
                            <td class="p-2 text-[8px] text-gray-400 leading-tight">${d.timestamp ? d.timestamp.toDate().toLocaleString('vi-VN') : 'Mới'}</td>
                        </tr>
                    `;
                });
            } catch(e) { 
                console.error(e);
                tb.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-400 text-xs">Không thể lấy dữ liệu. Kiểm tra kết nối.</td></tr>'; 
            }
        };

        window.closeTeacherModal = () => document.getElementById('teacherModal').classList.remove('active');

        // Speed Game Logic
        window.startSpeedGame = () => {
            document.getElementById('game-hub').classList.add('hidden');
            document.getElementById('game-speed').classList.remove('hidden');
            score = 0;
            document.getElementById('currentSpeedScore').innerText = "0";
            let t = 30;
            document.getElementById('speedTimer').innerText = t;
            
            timer = setInterval(() => {
                t--;
                document.getElementById('speedTimer').innerText = t;
                if(t <= 0) {
                    clearInterval(timer);
                    alert("Kết thúc! Điểm của bạn: " + score);
                    logScore("Tốc độ", score);
                    document.getElementById('game-hub').classList.remove('hidden');
                    document.getElementById('game-speed').classList.add('hidden');
                }
            }, 1000);
            nextTurn();
        };

        function nextTurn() {
            const target = cardinalData[Math.floor(Math.random()*cardinalData.length)];
            document.getElementById('targetWord').innerText = target.ru;
            const opts = [target.num];
            while(opts.length < 4) {
                let r = Math.floor(Math.random()*30) + 1;
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);
            const container = document.getElementById('gameOptions');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "bg-white text-blue-600 font-extrabold py-5 rounded-xl text-xl shadow active:bg-blue-50 active:scale-95 transition-all";
                b.innerText = o;
                b.onclick = () => {
                    if(o === target.num) { 
                        score += 10; 
                        document.getElementById('currentSpeedScore').innerText = score; 
                        nextTurn(); 
                    }
                };
                container.appendChild(b);
            });
        }

        // Lối tắt bàn phím
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'a') openTeacherModal();
        });
    </script>
</body>
</html>
